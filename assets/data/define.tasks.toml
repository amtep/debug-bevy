# Default task for a follower type is the first in order that accepts that type.

[gig-work]
follower-types = ["priest", "minion"]
income-per-day = [50, "job"]

[security]
follower-types = ["goon"]
security = 1

[petty-crime]
follower-types = ["minion"]
income-per-day = [100, "crime"]
suspicions = { police = 0.5 }

[priest-recruit-minions]
follower-types = ["priest"]
recruit-progress = ["minion", 1.0]
achievement = "started-recruiting"

[minion-recruit-minions]
follower-types = ["minion"]
requires-discovery = "minions-can-recruit"
recruit-progress = ["minion", 0.5]

[research]
follower-types = ["priest"]
expense-per-day = [50, "research"]
research = 1
