# Default task for a follower type is the first in order that accepts that type.

[gig-work]
follower-types = ["priest", "minion"]
effects = [{ income = { amount = [50, "job", 1] } }]

[security]
follower-types = ["goon"]
effects = [
  { suspicion-change = { suspicion = "intelligence", amount = -0.25 } },
  { suspicion-change = { suspicion = "police", amount = 0.25 } },
]

[petty-crime]
follower-types = ["minion", "goon"]
effects = [
  { income = { amount = [100, "crime", 1] } },
  { suspicion-change = { suspicion = "police", amount = 0.5 } }
]

[priest-recruit-minions]
follower-types = ["priest"]
effects = [
  { recruit = { follower = "minion", amount = 1.0 } },
  { suspicion-change = { suspicion = "media", amount = 0.25 } },
  { achievement = "started-recruiting" }
]

[minion-recruit-minions]
follower-types = ["minion"]
requires-discovery = "minions-can-recruit"
effects = [{ recruit = { follower = "minion", amount = 0.34 } }]

[priest-recruit-goons]
follower-types = ["priest"]
requires-discovery = "recruit-goons"
effects = [
  { recruit = { follower = "goon", amount = 1.0 } },
  { suspicion-change = { suspicion = "media", amount = 0.25 } },
]

[research]
follower-types = ["priest"]
effects = [
  { expense = { amount = [100, "research", 1] } },
  { research = 10 },
  { suspicion-change = { suspicion = "scientific", amount = 0.5 } }
]
